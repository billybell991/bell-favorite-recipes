baseURL = 'https://billybell991.github.io/bell-favorite-recipes/'
languageCode = 'en-us'
title = 'Bell Favorite Recipes'

[params]
  description = "Favorite recipes from friends, family, and around the web"
  author = "Billy Bell"
  mainSections = ["recipes"]
  dateFormat = "January 2, 2006"

[outputs]
  home = ["HTML", "RSS", "JSON"]

[outputFormats.JSON]
  mediaType = "application/json"
  baseName = "index"
  isPlainText = true

[menu]
  [[menu.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menu.main]]
    name = "All Recipes"
    url = "/recipes/"
    weight = 2
  [[menu.main]]
    name = "Categories"
    url = "/categories/"
    weight = 3
  [[menu.main]]
    name = "Submit a Recipe"
    url = "/submit/"
    weight = 4
  [[menu.main]]
    name = "Contact"
    url = "/contact/"
    weight = 5

[taxonomies]
  category = "categories"
  tag = "tags"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
