{{ define "head" }}
<script>
// Disable Hugo live-reload on this page so background file changes don't reset the form
          document.getElementById('clear-preview').addEventListener('click', function() {
            clearGeneratedImage();
          });
        <h1>Maintain Recipe</h1>
        <p class="submit-intro">Edit, update images, or delete recipes from one list.</p>
        <div style="background:#fff3cd; border:1px solid #ffc107; border-radius:8px; padding:1rem; margin-bottom:1.5rem; color:#856404;">
          ⚠️ <strong>Warning:</strong> Deleting a recipe permanently removes it from the site. This cannot be undone.
        </div>
        <div style="margin-bottom:1rem; display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap;">
          <input type="text" id="maintain-filter" placeholder="Filter recipes..." style="flex:1; min-width:200px;">
          <select id="maintain-cat-filter" style="min-width:180px;">
            <option value="">All Categories</option>
          </select>
          <span id="maintain-count" style="font-size:0.85rem; color:#666;"></span>
        </div>
        <div id="maintain-recipe-list"></div>
      </div>

      <!-- Edit form (hidden until recipe selected) -->
      <div id="edit-form-section" style="display:none;">
        <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; flex-wrap:wrap;">
          <button type="button" id="edit-back-btn" class="btn btn-secondary">&larr; Back to List</button>
          <h2 id="edit-recipe-heading" style="margin:0; font-size:1.3rem; color:#2c5530;"></h2>
        </div>

        <form class="recipe-form" id="edit-recipe-form">

          <div class="form-group">
            <label for="edit-title">Recipe Title *</label>
            <input type="text" id="edit-title" required>
          </div>

          <div class="form-group">
            <label for="edit-category">Category *</label>
            <select id="edit-category" required>
              <option value="">Select a category...</option>
              <option value="Air Fryer Recipes">Air Fryer Recipes</option>
              <option value="Family Recipes">Family Recipes</option>
              <option value="Friends Recipes">Friends' Recipes</option>
              <option value="Instant Pot Recipes">Instant Pot Recipes</option>
              <option value="Keto & Low Carb">Keto &amp; Low Carb</option>
              <option value="Misc Recipes - Cookbooks">Misc. Recipes (Cookbooks)</option>
              <option value="Misc Recipes - Internet">Misc. Recipes (Internet)</option>
              <option value="Mom's Cookbook">Mom's Cookbook</option>
              <option value="Wedding Cookbook">Wedding Cookbook</option>
              <option value="Weight Watchers">Weight Watchers</option>
            </select>
          </div>

          // --- Gemini image generation ---
          var RELAY_BASE = 'http://127.0.0.1:5000';
          var IMAGE_ASPECT = '16:9';
          var generatedImageBase64 = '';
          var generatedImageSlug = '';

          function getCategoryStyleHint(category) {
            if (category.indexOf('Keto') !== -1) return ' Low-carb presentation, fresh greens and avocado tones.';
            if (category.indexOf('Air Fryer') !== -1) return ' Golden crispy textures, emphasize the crunch.';
            if (category.indexOf('Instant Pot') !== -1) return ' Steaming, hearty, comfort food feel.';
            if (category.indexOf('Mom') !== -1 || category.indexOf('Wedding') !== -1 || category.indexOf('Family') !== -1) {
              return ' Homestyle, rustic, comforting kitchen setting.';
            }
            return '';
          }

          function buildFoodPromptFromData(data) {
            var title = data.title || '';
            var description = (data.description || '').trim();
            var ingredients = data.ingredients || [];
            var category = data.category || '';
            var ingText = ingredients.length ? ' Key ingredients: ' + ingredients.slice(0, 6).join(', ') + '.' : '';
            var descText = description ? ' About this dish: ' + description : '';
            var styleHint = getCategoryStyleHint(category);
            return (
              'Professional food photography of ' + title + '.' + descText +
              ' Beautifully plated and styled, shot from a 45-degree angle with soft natural lighting. '
              + 'Warm, inviting kitchen scene with subtle background blur (bokeh). '
              + 'The dish should look delicious, appetizing, and true to a real homemade version.'
              + ingText + styleHint +
              ' No text, no watermarks, no labels, no logos. Photorealistic style.'
            );
          }

          function buildFoodPromptFromForm() {
            var title = document.getElementById('recipe-title').value.trim();
            var category = document.getElementById('recipe-category').value;
            var description = document.getElementById('description').value.trim();
            var ingredientsRaw = document.getElementById('ingredients').value || '';
            var ingredients = ingredientsRaw.split('\n').map(function(line) {
              return line.replace(/^[-*]\s*/, '').trim();
            }).filter(function(line) { return line; });

            return buildFoodPromptFromData({
              title: title,
              description: description,
              ingredients: ingredients,
              category: category,
            });
          }

          function clearGeneratedImage() {
            generatedImageBase64 = '';
            generatedImageSlug = '';
            document.getElementById('image-url').value = '';
            document.getElementById('image-preview').style.display = 'none';
            document.getElementById('preview-img').src = '';
            document.getElementById('generate-image-status').textContent = '';
            updatePreview();
          }

          function requestGeminiImage(prompt) {
            return fetch(RELAY_BASE + '/relay/image', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                prompt: prompt,
                aspect_ratio: IMAGE_ASPECT,
              })
            }).then(function(r) {
              if (!r.ok) return r.json().then(function(d) {
                throw new Error(d.detail || 'Image generation failed');
              });
              return r.json();
            });
          }

          document.getElementById('generate-image-btn').addEventListener('click', function() {
            var title = document.getElementById('recipe-title').value.trim();
            var status = document.getElementById('generate-image-status');
            if (!title) {
              status.textContent = 'Enter a recipe title first.';
              status.style.color = '#c0392b';
              return;
            }

            status.textContent = 'Generating image...';
            status.style.color = '#666';
            this.disabled = true;

            var prompt = buildFoodPromptFromForm();
            var slug = slugify(title);

            requestGeminiImage(prompt).then(function(result) {
              generatedImageBase64 = result.image_base64 || '';
              if (!generatedImageBase64) throw new Error('No image data returned');
              generatedImageSlug = slug;

              var imagePath = 'images/recipes/' + slug + '.png';
              document.getElementById('image-url').value = imagePath;
              document.getElementById('preview-img').src = 'data:image/png;base64,' + generatedImageBase64;
              document.getElementById('image-preview').style.display = 'block';
              status.textContent = 'Image ready. It will be saved on submit.';
              status.style.color = '#27ae60';
              updatePreview();
            }).catch(function(err) {
              status.textContent = 'Error: ' + err.message;
              status.style.color = '#c0392b';
            }).finally(function() {
              document.getElementById('generate-image-btn').disabled = false;
            });
          });

          document.getElementById('clear-preview').addEventListener('click', function() {
            clearGeneratedImage();
          });

  // --- Slug generator ---
  function slugify(text) {
    return text
      .toLowerCase()
      .replace(/['']/g, '')
      .replace(/&/g, '-')
      .replace(/[^a-z0-9]+/g, '-')
      .replace(/^-+|-+$/g, '')
      .replace(/-{2,}/g, '-');
  }

  document.getElementById('recipe-title').addEventListener('input', function() {
    if (!generatedImageSlug) return;
    var newSlug = slugify(this.value.trim());
    if (newSlug && newSlug !== generatedImageSlug) {
      clearGeneratedImage();
    }
  });

  // --- Build markdown content ---
  function buildMarkdown() {
    var title = document.getElementById('recipe-title').value.trim();
    var category = document.getElementById('recipe-category').value;
    var subcategory = document.getElementById('recipe-subcategory').value;
    var prepTime = document.getElementById('prep-time').value.trim();
    var cookTime = document.getElementById('cook-time').value.trim();
    var servingsVal = document.getElementById('servings').value.trim();
    var description = document.getElementById('description').value.trim();
    var ingredients = document.getElementById('ingredients').value.trim();
    var instructions = document.getElementById('instructions').value.trim();
    var notes = document.getElementById('notes').value.trim();
    var credit = document.getElementById('source-credit').value.trim();
    var creditUrl = document.getElementById('source-url').value.trim();
    var imageUrl = document.getElementById('image-url').value.trim();
    var tags = document.getElementById('tags').value.trim();

    var now = new Date().toISOString().replace(/\.\d{3}Z$/, '-05:00');

    var fm = '---\n';
    fm += 'title: "' + title.replace(/"/g, '\\"') + '"\n';
    fm += 'date: ' + now + '\n';
    fm += 'draft: false\n';
    fm += 'categories: ["' + category + '"]\n';
    if (subcategory) {
      fm += 'subcategories: ["' + subcategory + '"]\n';
    }
    if (tags) {
      var tagList = tags.split(',').map(function(t) { return '"' + t.trim() + '"'; }).join(', ');
      fm += 'tags: [' + tagList + ']\n';
    } else {
      fm += 'tags: []\n';
    }
    fm += 'description: "' + description.replace(/"/g, '\\"') + '"\n';
    fm += 'source: ""\n';
    fm += 'creditUrl: "' + creditUrl + '"\n';
    fm += 'credit: "' + credit.replace(/"/g, '\\"') + '"\n';
    fm += 'prepTime: "' + prepTime + '"\n';
    fm += 'cookTime: "' + cookTime + '"\n';
    fm += 'servings: "' + servingsVal + '"\n';
    fm += 'image: "' + imageUrl + '"\n';
    fm += 'notes: "' + notes.replace(/"/g, '\\"').replace(/\n/g, ' ') + '"\n';
    fm += '---\n\n';

    // Ingredients
    fm += '## Ingredients\n\n';
    ingredients.split('\n').forEach(function(line) {
      line = line.trim();
      if (line) fm += '- ' + line + '\n';
    });

    // Instructions
    fm += '\n## Instructions\n\n';
    var stepNum = 1;
    instructions.split('\n').forEach(function(line) {
      line = line.trim();
      if (!line) return;
      // Strip leading number/dot if user already numbered
      line = line.replace(/^\d+[\.\)]\s*/, '');
      fm += stepNum + '. ' + line + '\n';
      stepNum++;
    });

    return fm;
  }

  // --- Live preview ---
  var formFields = document.querySelectorAll('#admin-recipe-form input, #admin-recipe-form textarea, #admin-recipe-form select');
  formFields.forEach(function(field) {
    field.addEventListener('input', updatePreview);
    field.addEventListener('change', updatePreview);
  });

  function updatePreview() {
    var pre = document.getElementById('md-preview');
    try {
      pre.textContent = buildMarkdown();
    } catch(e) {
      pre.textContent = '(fill in required fields to see preview)';
    }
  }

  function getRepoFileSha(filePath) {
    return fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + filePath + '?ref=' + BRANCH, {
      headers: { 'Authorization': 'Bearer ' + token }
    }).then(function(r) {
      if (r.status === 404) return null;
      if (!r.ok) throw new Error('Could not fetch file (HTTP ' + r.status + ')');
      return r.json().then(function(d) { return d.sha; });
    });
  }

  function upsertRepoFile(filePath, contentBase64, message) {
    return getRepoFileSha(filePath).then(function(sha) {
      var payload = {
        message: message,
        content: contentBase64,
        branch: BRANCH
      };
      if (sha) payload.sha = sha;

      return fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + filePath, {
        method: 'PUT',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json',
          'Accept': 'application/vnd.github.v3+json'
        },
        body: JSON.stringify(payload)
      });
    }).then(function(r) {
      if (!r.ok) return r.json().then(function(d) { throw new Error(d.message || 'API error'); });
      return r.json();
    });
  }

  // --- Submit to GitHub ---
  document.getElementById('admin-recipe-form').addEventListener('submit', function(e) {
    e.preventDefault();

    var title = document.getElementById('recipe-title').value.trim();
    if (!title) return;

    var slug = slugify(title);
    var filename = slug + '.md';
    var filePath = FILE_PATH_PREFIX + filename;
    var imagePath = generatedImageBase64 ? ('images/recipes/' + slug + '.png') : document.getElementById('image-url').value.trim();
    if (generatedImageBase64) {
      document.getElementById('image-url').value = imagePath;
    }
    var content = buildMarkdown();

    var btn = document.getElementById('submit-btn');
    var status = document.getElementById('submit-status');
    btn.disabled = true;
    btn.textContent = 'Committing...';
    status.textContent = '';
    status.style.color = '';

    // Base64 encode the content
    var encoded = btoa(unescape(encodeURIComponent(content)));

    var imageUpload = generatedImageBase64
      ? upsertRepoFile('static/images/recipes/' + slug + '.png', generatedImageBase64, 'Add image: ' + title)
      : Promise.resolve(null);

    imageUpload.then(function() {
      return fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + filePath, {
        method: 'PUT',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json',
          'Accept': 'application/vnd.github.v3+json'
        },
        body: JSON.stringify({
          message: 'Add recipe: ' + title,
          content: encoded,
          branch: BRANCH
        })
      });
    }).then(function(r) {
      if (!r.ok) return r.json().then(function(d) {
        var msg = d.message || 'API error';
        if (msg.indexOf('Resource not accessible') !== -1) {
          msg = 'Token lacks "Contents: Read and write" permission. Go to GitHub → Settings → Developer settings → Fine-grained tokens → edit your token → under Repository permissions, set Contents to "Read and write", then regenerate and re-authenticate here.';
        }
        throw new Error(msg);
      });
      return r.json();
    }).then(function(data) {
      document.getElementById('admin-recipe-form').style.display = 'none';
      document.getElementById('recipe-panel').querySelector('h1').style.display = 'none';
      document.getElementById('recipe-panel').querySelector('.submit-intro').style.display = 'none';
      var successEl = document.getElementById('form-success');
      successEl.style.display = 'block';
      document.getElementById('recipe-link-info').innerHTML =
        'Recipe file: <code>' + filename + '</code><br>' +
        'It will be live at <strong>/bell-favorite-recipes/recipes/' + slug + '/</strong> after rebuild.';
    }).catch(function(err) {
      status.textContent = 'Error: ' + err.message;
      status.style.color = '#c0392b';
      btn.disabled = false;
      btn.textContent = 'Add Recipe to Site';
    });
  });

  // --- Add another ---
  document.getElementById('add-another-btn').addEventListener('click', function() {
    document.getElementById('form-success').style.display = 'none';
    document.getElementById('admin-recipe-form').style.display = 'block';
    document.getElementById('admin-recipe-form').reset();
    document.getElementById('recipe-panel').querySelector('h1').style.display = '';
    document.getElementById('recipe-panel').querySelector('.submit-intro').style.display = '';
    clearGeneratedImage();
    document.getElementById('submit-btn').disabled = false;
    document.getElementById('submit-btn').textContent = 'Add Recipe to Site';
    document.getElementById('submit-status').textContent = '';
    document.getElementById('subcategory-group').style.display = 'none';
    document.getElementById('md-preview').textContent = '';
  });

  // =============================================
  // Tab Switching
  // =============================================
  document.querySelectorAll('.admin-tab').forEach(function(tab) {
    tab.addEventListener('click', function() {
      document.querySelectorAll('.admin-tab').forEach(function(t) {
        t.style.background = '#e8e8e8';
        t.style.color = '#333';
        t.classList.remove('active');
      });
      this.style.background = '#2c5530';
      this.style.color = '#fff';
      this.classList.add('active');

      document.querySelectorAll('.admin-tab-panel').forEach(function(p) { p.style.display = 'none'; });
      var target = this.getAttribute('data-tab');
      if (target === 'add-recipe') {
        document.getElementById('recipe-panel').style.display = 'block';
      } else if (target === 'maintain-recipe') {
        document.getElementById('maintain-recipe-panel').style.display = 'block';
        if (!maintainLoaded) loadMaintainList();
      }
    });
  });

  // =============================================
  // Maintain Recipe List
  // =============================================
  var allRecipes = [];
  var maintainLoaded = false;
  var maintainAllRecipes = [];
  var openInlineDelete = null;
  var PLACEHOLDER_IMG = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120"><rect fill="#f0f0f0" width="200" height="120"/><text x="100" y="65" text-anchor="middle" fill="#bbb" font-size="14">No Image</text></svg>');

  function loadRecipeList() {
    if (!maintainLoaded) loadMaintainList();
  }

  function loadMaintainList() {
    var listEl = document.getElementById('maintain-recipe-list');
    listEl.innerHTML = '<p style="text-align:center; color:#666; padding:2rem;">Loading recipes...</p>';

    var baseUrl = '{{ site.BaseURL }}'.replace(/\/$/, '');
    fetch(baseUrl + '/index.json')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        maintainAllRecipes = data.filter(function(r) {
          return r.permalink && r.permalink.indexOf('/recipes/') !== -1 && r.title;
        }).sort(function(a, b) {
          return (a.title || '').localeCompare(b.title || '');
        });

        allRecipes = maintainAllRecipes;

        var catSelect = document.getElementById('maintain-cat-filter');
        if (catSelect.options.length <= 1) {
          var cats = {};
          maintainAllRecipes.forEach(function(r) {
            if (r.categories) r.categories.forEach(function(c) { cats[c] = true; });
          });
          Object.keys(cats).sort().forEach(function(c) {
            var opt = document.createElement('option');
            opt.value = c;
            opt.textContent = c;
            catSelect.appendChild(opt);
          });
        }

        maintainLoaded = true;
        renderMaintainList();
      })
      .catch(function(err) {
        listEl.innerHTML = '<p style="color:#c0392b; text-align:center;">Error loading recipes: ' + err.message + '</p>';
      });
  }

  function renderMaintainList() {
    var filter = document.getElementById('maintain-filter').value.toLowerCase();
    var catFilter = document.getElementById('maintain-cat-filter').value;
    var filtered = maintainAllRecipes.filter(function(r) {
      if (filter && (r.title || '').toLowerCase().indexOf(filter) === -1) return false;
      if (catFilter && (!r.categories || r.categories.indexOf(catFilter) === -1)) return false;
      return true;
    });

    document.getElementById('maintain-count').textContent = filtered.length + ' of ' + maintainAllRecipes.length + ' recipes';
    var listEl = document.getElementById('maintain-recipe-list');
    listEl.innerHTML = '';
    openInlineDelete = null;

    if (filtered.length === 0) {
      listEl.innerHTML = '<p style="text-align:center; color:#999; padding:2rem;">No recipes match your filter.</p>';
      return;
    }

    filtered.forEach(function(recipe) {
      var wrapper = document.createElement('div');
      wrapper.style.cssText = 'border-bottom:1px solid #eee; padding:0.6rem 0.75rem;';

      var row = document.createElement('div');
      row.style.cssText = 'display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap;';

      var img = document.createElement('img');
      img.src = recipe.image || PLACEHOLDER_IMG;
      img.alt = recipe.title || '';
      img.loading = 'lazy';
      img.onerror = function() { this.src = PLACEHOLDER_IMG; };
      img.style.cssText = 'width:64px; height:48px; object-fit:cover; border-radius:6px; border:1px solid #eee;';

      var titleWrap = document.createElement('div');
      titleWrap.style.cssText = 'flex:1; min-width:180px;';
      var titleSpan = document.createElement('div');
      titleSpan.textContent = recipe.title;
      titleSpan.style.cssText = 'font-weight:600;';
      var catSpan = document.createElement('div');
      catSpan.textContent = (recipe.categories || []).join(', ');
      catSpan.style.cssText = 'font-size:0.78rem; color:#666;';
      titleWrap.appendChild(titleSpan);
      titleWrap.appendChild(catSpan);

      var actions = document.createElement('div');
      actions.style.cssText = 'display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap;';

      var editBtn = document.createElement('button');
      editBtn.type = 'button';
      editBtn.textContent = '✏️ Edit';
      editBtn.style.cssText = 'background:#2c5530; color:#fff; border:none; padding:0.35rem 0.9rem; border-radius:6px; font-size:0.85rem; cursor:pointer; white-space:nowrap;';
      editBtn.addEventListener('click', function() { openEditForm(recipe); });

      var imageBtn = document.createElement('button');
      imageBtn.type = 'button';
      imageBtn.textContent = '🖼 Update Image';
      imageBtn.style.cssText = 'background:#2471a3; color:#fff; border:none; padding:0.35rem 0.9rem; border-radius:6px; font-size:0.85rem; cursor:pointer; white-space:nowrap;';
      imageBtn.addEventListener('click', function() { openGeminiModal(recipe, wrapper); });

      var deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.textContent = '🗑 Delete';
      deleteBtn.style.cssText = 'background:#c0392b; color:#fff; border:none; padding:0.35rem 0.9rem; border-radius:6px; font-size:0.85rem; cursor:pointer; white-space:nowrap;';

      actions.appendChild(editBtn);
      actions.appendChild(imageBtn);
      actions.appendChild(deleteBtn);

      row.appendChild(img);
      row.appendChild(titleWrap);
      row.appendChild(actions);

      var confirmRow = document.createElement('div');
      confirmRow.style.cssText = 'display:none; margin-top:0.5rem; background:#fff3cd; border:1px solid #ffc107; border-radius:6px; padding:0.5rem; align-items:center; gap:0.5rem;';
      var confirmText = document.createElement('span');
      confirmText.textContent = 'Are you sure you want to delete this recipe?';
      confirmText.style.cssText = 'font-size:0.85rem; color:#856404;';
      var confirmYes = document.createElement('button');
      confirmYes.type = 'button';
      confirmYes.textContent = 'Yes, delete';
      confirmYes.style.cssText = 'background:#c0392b; color:#fff; border:none; padding:0.25rem 0.75rem; border-radius:6px; font-size:0.8rem; cursor:pointer; white-space:nowrap;';
      var confirmNo = document.createElement('button');
      confirmNo.type = 'button';
      confirmNo.textContent = 'Cancel';
      confirmNo.style.cssText = 'background:#e8e8e8; color:#333; border:none; padding:0.25rem 0.75rem; border-radius:6px; font-size:0.8rem; cursor:pointer; white-space:nowrap;';

      confirmYes.addEventListener('click', function() {
        confirmRow.style.display = 'none';
        openInlineDelete = null;
        confirmDeleteRecipe(recipe);
      });
      confirmNo.addEventListener('click', function() {
        confirmRow.style.display = 'none';
        openInlineDelete = null;
      });

      confirmRow.appendChild(confirmText);
      confirmRow.appendChild(confirmYes);
      confirmRow.appendChild(confirmNo);

      deleteBtn.addEventListener('click', function() {
        if (openInlineDelete && openInlineDelete !== confirmRow) {
          openInlineDelete.style.display = 'none';
        }
        confirmRow.style.display = 'flex';
        openInlineDelete = confirmRow;
      });

      wrapper.appendChild(row);
      wrapper.appendChild(confirmRow);
      listEl.appendChild(wrapper);
    });
  }

  document.getElementById('maintain-filter').addEventListener('input', renderMaintainList);
  document.getElementById('maintain-cat-filter').addEventListener('change', renderMaintainList);

  // =============================================
  // Gemini Image Modal
  // =============================================
  var modalRecipe = null;
  var modalCard = null;
  var modalNewBase64 = '';

  function openGeminiModal(recipe, card) {
    modalRecipe = recipe;
    modalCard = card;
    modalNewBase64 = '';

    document.getElementById('modal-recipe-title').textContent = recipe.title;
    var curImg = document.getElementById('modal-current-img');
    if (recipe.image) {
      curImg.src = recipe.image;
      curImg.style.display = 'block';
    } else {
      curImg.style.display = 'none';
    }

    document.getElementById('modal-confirm').style.display = 'none';
    document.getElementById('modal-save-status').textContent = '';
    document.getElementById('modal-generate-status').textContent = '';
    var saveBtn = document.getElementById('modal-save-btn');
    saveBtn.disabled = false;
    saveBtn.textContent = '\u2705 Save to Recipe';

    document.getElementById('pexels-modal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closePexelsModal() {
    document.getElementById('pexels-modal').style.display = 'none';
    document.body.style.overflow = '';
    modalRecipe = null;
  }

  function parseRecipeMarkdown(content) {
    var data = { title: '', description: '', ingredients: [] };
    var parts = content.split('---');
    if (parts.length >= 3) {
      var fm = parts[1];
      var descMatch = fm.match(/^description:\s*"?(.*?)"?\s*$/m);
      if (descMatch) data.description = descMatch[1].replace(/\\"/g, '"');
      var titleMatch = fm.match(/^title:\s*"?(.*?)"?\s*$/m);
      if (titleMatch) data.title = titleMatch[1].replace(/\\"/g, '"');
    }

    var body = parts.length >= 3 ? parts[2] : content;
    var inIngredients = false;
    body.split('\n').forEach(function(line) {
      if (/^##\s*Ingredients/i.test(line)) {
        inIngredients = true;
        return;
      }
      if (inIngredients) {
        if (/^##/.test(line)) {
          inIngredients = false;
          return;
        }
        var item = line.replace(/^[-*]\s*/, '').trim();
        if (item) data.ingredients.push(item);
      }
    });

    return data;
  }

  function fetchRecipeDetails(recipe) {
    var slug = recipe.permalink.replace(/.*\/recipes\//, '').replace(/\/$/, '');
    var rawUrl = 'https://raw.githubusercontent.com/' + REPO_OWNER + '/' + REPO_NAME + '/' + BRANCH + '/content/recipes/' + slug + '.md';
    return fetch(rawUrl).then(function(r) {
      if (!r.ok) throw new Error('Unable to fetch recipe content');
      return r.text();
    }).then(function(text) {
      return parseRecipeMarkdown(text);
    }).catch(function() {
      return { title: recipe.title || '', description: recipe.description || '', ingredients: [] };
    });
  }

  // =============================================
  // Save Image via GitHub API
  // =============================================
  document.getElementById('modal-save-btn').addEventListener('click', function() {
    if (!modalRecipe || !modalNewBase64 || !token) return;

    var btn = this;
    var status = document.getElementById('modal-save-status');
    btn.disabled = true;
    btn.textContent = 'Saving...';
    status.textContent = '';
    status.style.color = '';

    // Extract slug from permalink
    var slug = modalRecipe.permalink.replace(/.*\/recipes\//, '').replace(/\/$/, '');
    var filePath = FILE_PATH_PREFIX + slug + '.md';
    var imagePath = 'images/recipes/' + slug + '.png';

    // Step 1: Upload image to repo
    upsertRepoFile('static/images/recipes/' + slug + '.png', modalNewBase64, 'Update image: ' + modalRecipe.title)
      .then(function() {
        // Step 2: Get current file from GitHub
        return fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + filePath + '?ref=' + BRANCH, {
          headers: { 'Authorization': 'Bearer ' + token }
        });
      }).then(function(r) {
        if (!r.ok) throw new Error('Could not fetch recipe file (HTTP ' + r.status + ')');
        return r.json();
      }).then(function(fileData) {
        // Decode content
        var content = decodeURIComponent(escape(atob(fileData.content.replace(/\n/g, ''))));

        // Replace image line using line-by-line approach (more robust than regex)
        var lines = content.split('\n');
        var imageLineIdx = -1;
        var titleLineIdx = -1;
        var firstDashIdx = -1;
        var newImageLine = 'image: "' + imagePath + '"';

        for (var i = 0; i < lines.length; i++) {
          var trimmed = lines[i].replace(/\r$/, '').trim();
          if (trimmed === '---' && firstDashIdx === -1) {
            firstDashIdx = i;
          }
          if (/^image\s*:/i.test(trimmed)) {
            imageLineIdx = i;
          }
          if (/^title\s*:/i.test(trimmed) && titleLineIdx === -1) {
            titleLineIdx = i;
          }
        }

        if (imageLineIdx !== -1) {
          // Preserve line ending style
          var hadCR = lines[imageLineIdx].indexOf('\r') !== -1;
          lines[imageLineIdx] = newImageLine + (hadCR ? '\r' : '');
        } else if (titleLineIdx !== -1) {
          // Insert after title line
          var crStyle = lines[titleLineIdx].indexOf('\r') !== -1 ? '\r' : '';
          lines.splice(titleLineIdx + 1, 0, newImageLine + crStyle);
        } else if (firstDashIdx !== -1) {
          // Insert after opening ---
          var crStyle2 = lines[firstDashIdx].indexOf('\r') !== -1 ? '\r' : '';
          lines.splice(firstDashIdx + 1, 0, newImageLine + crStyle2);
        } else {
          throw new Error('File has no front matter (no --- found). First 100 chars: ' + content.substring(0, 100));
        }

        var newContent = lines.join('\n');

        // Step 3: Commit updated file
        var encoded = btoa(unescape(encodeURIComponent(newContent)));
        return fetch('https://api.github.com/repos/' + REPO_OWNER + '/' + REPO_NAME + '/contents/' + filePath, {
          method: 'PUT',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json',
            'Accept': 'application/vnd.github.v3+json'
          },
          body: JSON.stringify({
            message: 'Update image: ' + modalRecipe.title,
            content: encoded,
            sha: fileData.sha,
            branch: BRANCH
          })
        });
      }).then(function(r) {
      if (!r.ok) return r.json().then(function(d) {
        var msg = d.message || 'API error';
        if (msg.indexOf('Resource not accessible') !== -1) {
          msg = 'Token lacks "Contents: Read and write" permission.';
        }
        throw new Error(msg);
      });
      return r.json();
    }).then(function() {
      // Success — update the card in-place
      modalRecipe.image = imagePath;
      if (modalCard) {
        var cardImg = modalCard.querySelector('img');
        if (cardImg) cardImg.src = 'data:image/png;base64,' + modalNewBase64;
        modalCard.classList.remove('no-image');
        modalCard.classList.add('just-updated');
        setTimeout(function() { modalCard.classList.remove('just-updated'); }, 3000);
      }
      status.style.color = '#27ae60';
      status.textContent = 'Image updated! Site will rebuild in 1-2 minutes.';
      btn.textContent = '✅ Saved!';
      setTimeout(closePexelsModal, 1500);
    }).catch(function(err) {
      status.style.color = '#c0392b';
      status.textContent = 'Error: ' + err.message;
      btn.disabled = false;
      btn.textContent = '✅ Save to Recipe';
    });
  });

  function parseFrontmatter(content) {
    var result = {
      title: '', category: '', subcategory: '', description: '',
      prepTime: '', cookTime: '', servings: '', notes: '',
      credit: '', creditUrl: '', image: '', tags: [],
      date: '', source: '', ingredients: [], instructions: []
    };
    var lines = content.split('\n');
    var inFm = false;
    var fmEndIdx = -1;

    for (var i = 0; i < lines.length; i++) {
      var line = lines[i].replace(/\r$/, '');
      if (i === 0 && line.trim() === '---') { inFm = true; continue; }
      if (inFm) {
        if (line.trim() === '---') { inFm = false; fmEndIdx = i; continue; }
        var m;
        if ((m = line.match(/^title:\s*"?(.*?)"?\s*$/)) && m[1] !== undefined) result.title = m[1].replace(/\\"/g, '"');
        else if ((m = line.match(/^date:\s*(.*?)\s*$/))) result.date = m[1];
        else if ((m = line.match(/^categories:\s*\["?([^"\]]*)"?\]/))) result.category = m[1];
        else if ((m = line.match(/^subcategories:\s*\["?([^"\]]*)"?\]/))) result.subcategory = m[1];
        else if ((m = line.match(/^description:\s*"?(.*?)"?\s*$/)) && m[1] !== undefined) result.description = m[1].replace(/\\"/g, '"');
        else if ((m = line.match(/^source:\s*"?(.*?)"?\s*$/))) result.source = m[1];
        else if ((m = line.match(/^creditUrl:\s*"?(.*?)"?\s*$/))) result.creditUrl = m[1];
        else if ((m = line.match(/^credit:\s*"?(.*?)"?\s*$/)) && m[1] !== undefined) result.credit = m[1].replace(/\\"/g, '"');
        else if ((m = line.match(/^prepTime:\s*"?(.*?)"?\s*$/))) result.prepTime = m[1];
        else if ((m = line.match(/^cookTime:\s*"?(.*?)"?\s*$/))) result.cookTime = m[1];
        else if ((m = line.match(/^servings:\s*"?(.*?)"?\s*$/))) result.servings = m[1];
        else if ((m = line.match(/^image:\s*"?(.*?)"?\s*$/))) result.image = m[1];
        else if ((m = line.match(/^notes:\s*"?(.*?)"?\s*$/)) && m[1] !== undefined) result.notes = m[1].replace(/\\"/g, '"');
        else if ((m = line.match(/^tags:\s*\[(.*?)\]\s*$/))) {
          result.tags = m[1].split(',').map(function(t) {
            return t.trim().replace(/^["']|["']$/g, '');
          }).filter(function(t) { return t.length > 0; });
        }
      }
    }

    var bodyLines = fmEndIdx >= 0 ? lines.slice(fmEndIdx + 1) : lines;
    var section = '';
    bodyLines.forEach(function(bl) {
      bl = bl.replace(/\r$/, '');
      if (/^##\s+Ingredients/i.test(bl)) { section = 'ingredients'; return; }
      if (/^##\s+Instructions/i.test(bl)) { section = 'instructions'; return; }
      if (/^##/.test(bl)) { section = ''; return; }
      var m2;
      if (section === 'ingredients' && (m2 = bl.match(/^[-*]\s+(.*)/)) && m2[1].trim()) {
        result.ingredients.push(m2[1].trim());
      } else if (section === 'instructions' && (m2 = bl.match(/^\d+[\.\)]\s+(.*)/)) && m2[1].trim()) {
        result.instructions.push(m2[1].trim());
      }
    });

    return result;
  }

  function prefillEditForm(data) {

  function buildEditMarkdown() {
    var title = document.getElementById('edit-title').value.trim();
    var category = document.getElementById('edit-category').value;
    var subcategory = document.getElementById('edit-subcategory').value;
    var prepTime = document.getElementById('edit-prep-time').value.trim();
    var cookTime = document.getElementById('edit-cook-time').value.trim();
    var servingsVal = document.getElementById('edit-servings').value.trim();
    var description = document.getElementById('edit-description').value.trim();
    var ingredients = document.getElementById('edit-ingredients').value.trim();
    var instructions = document.getElementById('edit-instructions').value.trim();
    var notes = document.getElementById('edit-notes').value.trim();
    var credit = document.getElementById('edit-source-credit').value.trim();
    var creditUrl = document.getElementById('edit-source-url').value.trim();
    var imageUrl = document.getElementById('edit-image-url').value.trim();
    var tags = document.getElementById('edit-tags').value.trim();

    var dateStr = editOriginalDate || new Date().toISOString().replace(/\.\d{3}Z$/, '-05:00');

    var fm = '---\n';
    fm += 'title: "' + title.replace(/"/g, '\\"') + '"\n';
    fm += 'date: ' + dateStr + '\n';
    fm += 'draft: false\n';
    fm += 'categories: ["' + category + '"]\n';
    if (subcategory) fm += 'subcategories: ["' + subcategory + '"]\n';
    if (tags) {
      var tagList = tags.split(',').map(function(t) { return '"' + t.trim() + '"'; }).join(', ');
      fm += 'tags: [' + tagList + ']\n';
    } else {
      fm += 'tags: []\n';
    }
    fm += 'description: "' + description.replace(/"/g, '\\"') + '"\n';
    fm += 'source: ""\n';
    fm += 'creditUrl: "' + creditUrl + '"\n';
    fm += 'credit: "' + credit.replace(/"/g, '\\"') + '"\n';
    fm += 'prepTime: "' + prepTime + '"\n';
    fm += 'cookTime: "' + cookTime + '"\n';
    fm += 'servings: "' + servingsVal + '"\n';
    fm += 'image: "' + imageUrl + '"\n';
    fm += 'notes: "' + notes.replace(/"/g, '\\"').replace(/\n/g, ' ') + '"\n';
    fm += '---\n\n';

    fm += '## Ingredients\n\n';
    ingredients.split('\n').forEach(function(line) {
      line = line.trim();
      if (line) fm += '- ' + line + '\n';
    });

    fm += '\n## Instructions\n\n';
    var stepNum = 1;
    instructions.split('\n').forEach(function(line) {
      line = line.trim();
      if (!line) return;
      line = line.replace(/^\d+[\.\)]\s*/, '');
      fm += stepNum + '. ' + line + '\n';
      stepNum++;
    });

    return fm;
  }

    }).then(function(r) {
      if (!r.ok) return r.json().then(function(d) {
        var msg = d.message || 'API error';
        if (msg.indexOf('Resource not accessible') !== -1) {
          msg = 'Token lacks "Contents: Read and write" permission.';
        }
        throw new Error(msg);
      });
      return r.json();
    }).then(function(data) {
      // Update SHA so a second save in the same session works
      editCurrentSha = data.content && data.content.sha ? data.content.sha : editCurrentSha;
      // Update the name in edit heading if title changed
      editCurrentRecipe.title = newTitle;

      btn.disabled = false;
      btn.textContent = 'Save Changes';
    }).catch(function(err) {
      status.style.color = '#c0392b';
      status.textContent = 'Error: ' + err.message;
      btn.disabled = false;
      btn.textContent = 'Save Changes';
    });
  });

  

})();
