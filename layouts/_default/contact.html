{{ define "main" }}
<div class="contact-page">
  <div class="container">
    <h1>Contact Me</h1>
    <p class="contact-intro">Have a question, a suggestion, or just want to say hello? Drop me a message below and I'll get back to you!</p>

    <form class="contact-form" id="contact-form" action="https://formspree.io/f/xvzwpbeq" method="POST">
      <input type="text" name="_gotcha" style="display:none">

      <div class="form-group">
        <label for="contact-name">Your Name *</label>
        <input type="text" id="contact-name" name="name" required placeholder="Your name">
      </div>

      <div class="form-group">
        <label for="contact-email">Your Email *</label>
        <input type="email" id="contact-email" name="_replyto" required placeholder="your@email.com">
      </div>

      <div class="form-group">
        <label for="contact-subject">Subject</label>
        <input type="text" id="contact-subject" name="subject" placeholder="What's this about?">
      </div>

      <div class="form-group">
        <label for="contact-message">Message *</label>
        <textarea id="contact-message" name="message" required rows="6" placeholder="Type your message here..."></textarea>
      </div>

      <button type="submit" class="btn btn-primary">Send Message</button>
    </form>

    <div id="contact-success" class="form-success" style="display: none;">
      <div class="success-icon">✉️</div>
      <h2>Message Sent!</h2>
      <p>Thanks for reaching out! I'll get back to you as soon as I can.</p>
      <a href="{{ site.Home.RelPermalink }}" class="btn btn-primary">Back to Home</a>
    </div>
  </div>
</div>
{{ end }}

{{ define "scripts" }}
<script>
document.getElementById('contact-form').addEventListener('submit', function(e) {
  var form = this;
  var formData = new FormData(form);

  e.preventDefault();

  fetch(form.action, {
    method: 'POST',
    body: formData,
    headers: { 'Accept': 'application/json' }
  }).then(function(response) {
    if (response.ok) {
      form.style.display = 'none';
      document.getElementById('contact-success').style.display = 'block';
    } else {
      alert('There was a problem sending your message. Please try again.');
    }
  }).catch(function() {
    alert('There was a problem sending your message. Please try again.');
  });
});
</script>
{{ end }}
